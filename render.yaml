services:
  - type: web
    name: goldos-server
    runtime: node
    plan: free
    rootDir: .
    # Seed runs every build — idempotent (seed.ts nukes the prior demo tenant first).
    # Remove the trailing `&& npx tsx server/prisma/seed.ts` once a real merchant is on this DB.
    buildCommand: npm install --include=dev && npm run prisma:generate -w @goldos/server && npx prisma migrate deploy --schema server/prisma/schema.prisma && npx tsx server/prisma/seed.ts
    startCommand: npx tsx server/src/index.ts
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
