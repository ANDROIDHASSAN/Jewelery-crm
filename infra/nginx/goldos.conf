server {
  listen 80;
  server_name goldos.in www.goldos.in;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name goldos.in www.goldos.in;

  # Cloudflare terminates one layer; Let's Encrypt for origin SSL.
  ssl_certificate     /etc/letsencrypt/live/goldos.in/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/goldos.in/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;

  client_max_body_size 25m;
  gzip on;
  gzip_types text/plain application/json application/javascript text/css image/svg+xml;

  # API + SSR client served by the same Node process on :4000.
  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
  }

  # Long-lived SSE stream.
  location /api/v1/events {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
  }
}
