name: Keep Render server warm

# Render Free tier sleeps after 15 minutes of inactivity. A 30-second cold-start
# on the first user request was the dominant contributor to the perceived
# "10+ second load time" — pinging /health every 10 minutes keeps the dyno
# (and the Neon Postgres compute) alive for the demo.
#
# Cost: ~3 hours of free-tier GitHub Actions minutes / month. Well within the
# 2,000-minute quota for private repos.
#
# Strip this workflow before any merchant uses the deploy in production —
# upgrade Render to the $7/mo Starter plan instead (no sleep, always-on).

on:
  schedule:
    # Every 10 minutes (GitHub Actions cron minimum is 5 min; 10 is plenty for
    # a 15-min sleep timeout). Times are UTC.
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: keep-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Render health endpoint
        run: |
          set -euo pipefail
          # -fsS: fail on non-2xx, silent progress, show errors
          # -m 60: 60s overall timeout (Render cold start can take ~30s)
          # --retry 2 --retry-delay 5: tolerate transient network blips
          curl -fsS -m 60 --retry 2 --retry-delay 5 \
            https://goldos-server.onrender.com/api/v1/health \
            -o /tmp/health.json
          echo "Response:"; cat /tmp/health.json; echo
