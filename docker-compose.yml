services:
  postgres:
    image: postgres:15-alpine
    container_name: goldos-postgres
    environment:
      POSTGRES_USER: goldos
      POSTGRES_PASSWORD: goldos
      POSTGRES_DB: goldos
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goldos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: goldos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: goldos-meilisearch
    environment:
      MEILI_MASTER_KEY: goldos-dev-key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: goldos-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: goldos
      MINIO_ROOT_PASSWORD: goldos-dev-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  redis-data:
  meili-data:
  minio-data:
